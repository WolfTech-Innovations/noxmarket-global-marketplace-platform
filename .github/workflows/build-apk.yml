name: Build Nox APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup Java ─────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Setup Android SDK (auto-accepts all licenses) ──
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: false
          packages: 'build-tools;34.0.0 platforms;android-34'

      # ── 4. Setup Node + install Bubblewrap ────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      # ── 5. Restore keystore (skip on first run) ───────
      - name: Restore keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android.keystore
            echo "Restored existing keystore."
          else
            echo "No keystore found — Bubblewrap will generate one."
          fi

      # ── 6. Init TWA project ───────────────────────────
      # --skipPwaValidation skips the icon/manifest online check
      # BUBBLEWRAP_KEYSTORE_PASSWORD + KEY_PASSWORD env vars
      # make it fully non-interactive
      - name: Init TWA project
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          bubblewrap init \
            --manifest https://nox.lebnix.org/manifest.json \
            --directory android-project \
            --skipPwaValidation

      # ── 7. Build APK ──────────────────────────────────
      - name: Build APK
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          cd android-project
          bubblewrap build --skipPwaValidation

      # ── 8. Upload APK artifact ────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nox-apk
          path: |
            android-project/app-release-signed.apk
            android-project/app-release-bundle.aab
          if-no-files-found: warn
          retention-days: 30

      # ── 9. Print SHA-256 fingerprint ──────────────────
      # Paste this into nox.lebnix.org/.well-known/assetlinks.json
      # to remove the browser address bar from the TWA
      - name: Print signing fingerprint
        run: |
          keytool -list -v \
            -keystore android.keystore \
            -alias nox \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            2>/dev/null | grep "SHA256:" \
            || echo "Could not read keystore — check your secrets."

      # ── 10. Upload keystore backup ────────────────────
      # Download this artifact, base64-encode it, and save
      # it as the KEYSTORE_BASE64 secret so future builds
      # reuse the same signing key:
      #   cat android.keystore | base64
      - name: Upload keystore backup
        uses: actions/upload-artifact@v4
        with:
          name: android-keystore-BACKUP
          path: android.keystore
          retention-days: 7
          
