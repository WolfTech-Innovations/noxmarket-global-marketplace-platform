name: Build Nox APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Write twa-manifest.json ────────────────────
      - name: Write twa-manifest.json
        run: |
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "org.lebnix.nox",
            "host": "nox.lebnix.org",
            "name": "Nox",
            "launcherName": "Nox",
            "display": "standalone",
            "orientation": "default",
            "themeColor": "#000000",
            "navigationColor": "#000000",
            "navigationColorDark": "#000000",
            "navigationDividerColor": "#000000",
            "navigationDividerColorDark": "#000000",
            "backgroundColor": "#000000",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://nox.lebnix.org/icons/icon-512.png",
            "maskableIconUrl": "https://nox.lebnix.org/icons/icon-512.png",
            "monochromeIconUrl": "https://nox.lebnix.org/icons/icon-512.png",
            "manifestUrl": "https://nox.lebnix.org/manifest.json",
            "webManifestUrl": "https://nox.lebnix.org/manifest.json",
            "generatorApp": "bubblewrap-cli",
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://nox.lebnix.org/",
            "minSdkVersion": 21,
            "appVersionCode": 1,
            "appVersionName": "1.0.0",
            "shortcuts": [],
            "features": {},
            "alphaDependencies": { "enabled": false },
            "enableSiteSettingsShortcut": true,
            "isTrustedWebActivity": true,
            "fallbackType": "customtabs",
            "additionalTrustedOrigins": [],
            "retainedBundles": [],
            "signingKey": {
              "path": "android.keystore",
              "alias": "nox"
            },
            "signingKeyCreatedByBubblewrap": true
          }
          EOF

      # ── 3. Restore keystore (skip on first run) ───────
      - name: Restore keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android.keystore
            echo "Restored existing keystore."
          else
            echo "No keystore secret found — Bubblewrap will generate one."
          fi

      # ── 4. Init TWA project via Docker ────────────────
      # Uses the official Bubblewrap Docker image — no JDK prompts,
      # no SDK downloads, no platform issues.
      - name: Init TWA project
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            -e BUBBLEWRAP_KEYSTORE_PASSWORD \
            -e BUBBLEWRAP_KEY_PASSWORD \
            ghcr.io/googlechromelabs/bubblewrap:latest \
            init \
            --manifest https://nox.lebnix.org/manifest.json \
            --directory android-project \
            --skipPwaValidation

      # ── 5. Build APK via Docker ───────────────────────
      - name: Build APK
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work/android-project \
            -e BUBBLEWRAP_KEYSTORE_PASSWORD \
            -e BUBBLEWRAP_KEY_PASSWORD \
            ghcr.io/googlechromelabs/bubblewrap:latest \
            build \
            --skipPwaValidation

      # ── 6. Upload APK artifact ────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nox-apk
          path: |
            android-project/app-release-signed.apk
            android-project/app-release-bundle.aab
          retention-days: 30

      # ── 7. Print SHA-256 fingerprint ──────────────────
      # Copy this into nox.lebnix.org/.well-known/assetlinks.json
      # to remove the browser address bar from the TWA.
      - name: Print signing fingerprint
        run: |
          keytool -list -v \
            -keystore android.keystore \
            -alias nox \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            2>/dev/null | grep "SHA256:" || echo "Keystore not found — check secrets."

      # ── 8. Save keystore as artifact (first run only) ─
      # After first run: download android-keystore-BACKUP artifact,
      # then run: cat android.keystore | base64
      # and paste the output as the KEYSTORE_BASE64 secret.
      - name: Upload keystore backup
        uses: actions/upload-artifact@v4
        with:
          name: android-keystore-BACKUP
          path: android.keystore
          retention-days: 7
